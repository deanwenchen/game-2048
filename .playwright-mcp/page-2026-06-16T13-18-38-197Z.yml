    - heading "Game Rules & Scoring" [level=2] [ref=e43]
    - paragraph [ref=e44]: Every time you merge two tiles, the value of the new tile is added to your score. A 2+2 merge earns 4 points, a 4+4 merge earns 8 points, and so on. The game ends when no more moves are possible, meaning the board is full and no adjacent tiles share the same value.
    - paragraph [ref=e45]: After each move, a new tile (either 2 or 4) appears randomly on an empty cell. Plan your moves carefully to avoid filling up the board before reaching 2048!
  - generic [ref=e46]:
    - heading "Pro Tips & Strategies" [level=2] [ref=e47]
    - list [ref=e48]:
      - listitem [ref=e49]: ▸ Keep your highest-value tile in a corner. It acts as an anchor for building larger tiles.
      - listitem [ref=e50]: ▸ Build a chain of descending values along one edge (e.g., 1024 → 512 → 256 → 128).
      - listitem [ref=e51]: ▸ Avoid pressing the "down" arrow randomly. It breaks your corner strategy.
      - listitem [ref=e52]: ▸ Plan at least 2-3 moves ahead. Each move should bring you closer to merging your target tiles.
      - listitem [ref=e53]: ▸ When the board gets crowded, focus on freeing up space by merging low-value tiles first.
      - listitem [ref=e54]: ▸ After reaching 2048, you can continue playing to chase even higher tiles like 4096 and 8192!
